x-security-env: &security-env
  JWT_SIGNING_KEY: shared-jwt-signing-key
  INTERNAL_SERVICE_JWT_SECRET: internal-service-secret
  INTERNAL_SERVICE_JWT_ALGORITHM: HS256
  INTERNAL_SERVICE_ISSUER: order-service

x-app-network: &app-network
  networks:
    - ecom-network

services:
  ai-db:
    image: postgres:16
    container_name: ai-db
    environment:
      POSTGRES_DB: ai_db
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_pass
    ports:
      - "5433:5432"
    volumes:
      - ai_pg_data:/var/lib/postgresql/data
    <<: *app-network

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    <<: *app-network

  product-db:
    image: postgres:16
    container_name: product-db
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_pass
    ports:
      - "5432:5432"
    volumes:
      - product_pg_data:/var/lib/postgresql/data
    <<: *app-network

  user-db:
    image: mysql:8.0
    container_name: user-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: user_db
      MYSQL_USER: user_user
      MYSQL_PASSWORD: user_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - user_mysql_data:/var/lib/mysql
    <<: *app-network

  cart-db:
    image: mysql:8.0
    container_name: cart-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: cart_db
      MYSQL_USER: cart_user
      MYSQL_PASSWORD: cart_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3308:3306"
    volumes:
      - cart_mysql_data:/var/lib/mysql
    <<: *app-network

  order-db:
    image: mysql:8.0
    container_name: order-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: order_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3309:3306"
    volumes:
      - order_mysql_data:/var/lib/mysql
    <<: *app-network

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: payment_db
      MYSQL_USER: payment_user
      MYSQL_PASSWORD: payment_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3310:3306"
    volumes:
      - payment_mysql_data:/var/lib/mysql
    <<: *app-network

  shipping-db:
    image: mysql:8.0
    container_name: shipping-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: shipping_db
      MYSQL_USER: shipping_user
      MYSQL_PASSWORD: shipping_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3311:3306"
    volumes:
      - shipping_mysql_data:/var/lib/mysql
    <<: *app-network

  product-service:
    build: ./product-service
    container_name: product-service
    env_file:
      - ./product-service/.env.example
    environment:
      <<: *security-env
      INTERNAL_SERVICE_AUDIENCE: product-service
    volumes:
      - ./product-service:/app
    ports:
      - "8001:8001"
    depends_on:
      - product-db
    command: >
      sh -c "until python -c \"import os, socket; s = socket.socket(); s.settimeout(2); s.connect((os.environ['DB_HOST'], int(os.environ['DB_PORT']))); s.close()\"; do
      echo 'Waiting for product database...'; sleep 2; done;
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py runserver 0.0.0.0:8001"
    <<: *app-network

  user-service:
    build: ./user-service
    container_name: user-service
    env_file:
      - ./user-service/.env.example
    environment:
      <<: *security-env
    volumes:
      - ./user-service:/app
    ports:
      - "8002:8002"
    depends_on:
      - user-db
    command: >
      sh -c "until python -c \"import os, socket; s = socket.socket(); s.settimeout(2); s.connect((os.environ['DB_HOST'], int(os.environ['DB_PORT']))); s.close()\"; do
      echo 'Waiting for user database...'; sleep 2; done;
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py runserver 0.0.0.0:8002"
    <<: *app-network

  cart-service:
    build: ./cart-service
    container_name: cart-service
    env_file:
      - ./cart-service/.env.example
    environment:
      <<: *security-env
      INTERNAL_SERVICE_AUDIENCE: cart-service
    volumes:
      - ./cart-service:/app
    ports:
      - "8003:8003"
    depends_on:
      - cart-db
    command: >
      sh -c "until python -c \"import os, socket; s = socket.socket(); s.settimeout(2); s.connect((os.environ['DB_HOST'], int(os.environ['DB_PORT']))); s.close()\"; do
      echo 'Waiting for cart database...'; sleep 2; done;
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py runserver 0.0.0.0:8003"
    <<: *app-network

  order-service:
    build: ./order-service
    container_name: order-service
    env_file:
      - ./order-service/.env.example
    environment:
      <<: *security-env
      INTERNAL_SERVICE_NAME: order-service
    volumes:
      - ./order-service:/app
    ports:
      - "8004:8004"
    depends_on:
      - order-db
      - cart-service
      - payment-service
      - product-service
      - shipping-service
    command: >
      sh -c "until python -c \"import os, socket; s = socket.socket(); s.settimeout(2); s.connect((os.environ['DB_HOST'], int(os.environ['DB_PORT']))); s.close()\"; do
      echo 'Waiting for order database...'; sleep 2; done;
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py runserver 0.0.0.0:8004"
    <<: *app-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    env_file:
      - ./payment-service/.env.example
    environment:
      <<: *security-env
      INTERNAL_SERVICE_AUDIENCE: payment-service
    volumes:
      - ./payment-service:/app
    ports:
      - "8005:8005"
    depends_on:
      - payment-db
    command: >
      sh -c "until python -c \"import os, socket; s = socket.socket(); s.settimeout(2); s.connect((os.environ['DB_HOST'], int(os.environ['DB_PORT']))); s.close()\"; do
      echo 'Waiting for payment database...'; sleep 2; done;
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py runserver 0.0.0.0:8005"
    <<: *app-network

  shipping-service:
    build: ./shipping-service
    container_name: shipping-service
    env_file:
      - ./shipping-service/.env.example
    environment:
      <<: *security-env
      INTERNAL_SERVICE_AUDIENCE: shipping-service
    volumes:
      - ./shipping-service:/app
    ports:
      - "8006:8006"
    depends_on:
      - shipping-db
    command: >
      sh -c "until python -c \"import os, socket; s = socket.socket(); s.settimeout(2); s.connect((os.environ['DB_HOST'], int(os.environ['DB_PORT']))); s.close()\"; do
      echo 'Waiting for shipping database...'; sleep 2; done;
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py runserver 0.0.0.0:8006"
    <<: *app-network

  ai-service:
    build: ./ai-service
    container_name: ai-service
    env_file:
      - ./ai-service/.env.example
    volumes:
      - ./ai-service:/app
      - ./docs/ai-service:/workspace-docs/ai-service
    ports:
      - "8007:8007"
    depends_on:
      - ai-db
      - neo4j
      - product-service
      - order-service
    command: >
      sh -c "until python -c \"import os, socket; s = socket.socket(); s.settimeout(2); s.connect((os.environ['AI_DB_HOST'], int(os.environ['AI_DB_PORT']))); s.close()\"; do
      echo 'Waiting for AI database...'; sleep 2; done;
      uvicorn app.main:app --host 0.0.0.0 --port 8007"
    <<: *app-network

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - ai-service
    <<: *app-network

  frontend:
    build: 
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - ai-service
    env_file:
      - ./frontend/.env.production
    <<: *app-network

volumes:
  ai_pg_data:
  neo4j_data:
  product_pg_data:
  user_mysql_data:
  cart_mysql_data:
  order_mysql_data:
  payment_mysql_data:
  shipping_mysql_data:

networks:
  ecom-network:
    driver: bridge
