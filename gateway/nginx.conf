worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format chapter4_main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for" '
        'rt=$request_time ua="$upstream_addr" us="$upstream_status" '
        'urt="$upstream_response_time" cid="$http_x_correlation_id"';

    access_log /var/log/nginx/access.log chapter4_main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    server_tokens off;

    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;

    upstream user_service {
        server user-service:8002;
        keepalive 16;
    }

    upstream product_service {
        server product-service:8001;
        keepalive 16;
    }

    upstream cart_service {
        server cart-service:8003;
        keepalive 16;
    }

    upstream order_service {
        server order-service:8004;
        keepalive 16;
    }

    upstream payment_service {
        server payment-service:8005;
        keepalive 16;
    }

    upstream shipping_service {
        server shipping-service:8006;
        keepalive 16;
    }

    upstream ai_service {
        server ai-service:8007;
        keepalive 16;
    }

    map $http_x_correlation_id $effective_correlation_id {
        default $http_x_correlation_id;
        "" $request_id;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location = /health {
            default_type application/json;
            return 200 '{"service":"gateway","status":"ok"}';
        }

        location = / {
            default_type application/json;
            return 200 '{"service":"gateway","message":"Use /api/users, /api/products, /api/cart, /api/orders, /api/payments, /api/shipping, or /api/ai."}';
        }

        location ~ ^/api/(products|cart|orders|payments|shipping|ai)/internal/ {
            default_type application/json;
            return 403 '{"detail":"Internal routes are not publicly accessible through the gateway."}';
        }

        location /api/users/auth/ {
            rewrite ^/api/users/auth/(.*)$ /auth/$1 break;
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/users/ {
            rewrite ^/api/users/(.*)$ /$1 break;
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/products/ {
            rewrite ^/api/products/(.*)$ /$1 break;
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location = /api/cart/health {
            rewrite ^ /health break;
            proxy_pass http://cart_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/cart/ {
            rewrite ^/api/cart/(.*)$ /cart/$1 break;
            proxy_pass http://cart_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location = /api/orders/health {
            rewrite ^ /health break;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/orders/ {
            rewrite ^/api/orders/(.*)$ /orders/$1 break;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location = /api/orders {
            return 301 /api/orders/;
        }

        location = /api/payments/health {
            rewrite ^ /health break;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/payments/ {
            rewrite ^/api/payments/(.*)$ /payment/$1 break;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location = /api/shipping/health {
            rewrite ^ /health break;
            proxy_pass http://shipping_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/shipping/ {
            rewrite ^/api/shipping/(.*)$ /shipping/$1 break;
            proxy_pass http://shipping_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/ai/ {
            rewrite ^/api/ai/(.*)$ /$1 break;
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        # Compatibility aliases to keep the existing frontend proxy contract functional
        # during the transition to the dedicated gateway.
        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /auth/$1 break;
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/categories/ {
            rewrite ^/api/categories/(.*)$ /categories/$1 break;
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/payment/ {
            rewrite ^/api/payment/(.*)$ /payment/$1 break;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $effective_correlation_id;
            proxy_set_header Authorization $http_authorization;
        }

        location = /api/payment {
            return 301 /api/payment/;
        }

        location = /api/shipping {
            return 301 /api/shipping/;
        }

        location = /api/cart {
            return 301 /api/cart/;
        }

        location = /api/users {
            return 301 /api/users/;
        }

        location = /api/products {
            return 301 /api/products/;
        }

        location = /api/payments {
            return 301 /api/payments/;
        }

        location = /api/ai {
            return 301 /api/ai/;
        }

        location = /api/categories {
            return 301 /api/categories/;
        }
    }
}
